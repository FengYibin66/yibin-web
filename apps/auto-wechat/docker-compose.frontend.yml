# 与 docker-compose.dev.yml 叠加使用（服务器生产入口 :80）
# 示例：docker compose -f docker-compose.dev.yml -f docker-compose.frontend.yml up -d frontend

services:
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx-http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_started
