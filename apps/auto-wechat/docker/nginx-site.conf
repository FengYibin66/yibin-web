# 正式环境：HTTP 跳转 HTTPS + 静态前端 + API 反代

server {
    listen 80;
    server_name mpauto.yibinfeng.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    server_name mpauto.yibinfeng.com;

    ssl_certificate /etc/letsencrypt/live/mpauto.yibinfeng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mpauto.yibinfeng.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
