<!-- 微信公众号模板：轨道粒子 Hero -->
<!--
  TEMPLATE_META:
  name: 轨道粒子刊头
  description: 自动旋转轨道环 + 中心标题 + 点击同圆能量脉冲（animate 与点击圆同一元素）
  tags: [大模型, 基础设施, 论文]
  hasSvg: true
  INTERACTION: 自动循环动画 + 点击触发
-->
<section style="max-width:680px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#000;">

  <svg style="display:block;width:100%;overflow:hidden;" viewBox="0 0 640 320" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="640" height="320" fill="#030712"/>
    <line x1="0" y1="80" x2="640" y2="80" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="160" x2="640" y2="160" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="240" x2="640" y2="240" stroke="#1e293b" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="320" stroke="#1e293b" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="320" stroke="#1e293b" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="320" stroke="#1e293b" stroke-width="1"/>

    <g transform="translate(320,160)">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="24s" begin="0s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="0" cy="0" rx="200" ry="70" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.6"/>
      <circle cx="200" cy="0" r="6" fill="#60a5fa">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-200" cy="0" r="4" fill="#818cf8"/>
      <circle cx="0" cy="70" r="5" fill="#22d3ee"/>
      <circle cx="0" cy="-70" r="4" fill="#a78bfa"/>
    </g>

    <text x="320" y="145" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="3" font-family="-apple-system,PingFang SC,sans-serif">AI TECH DAILY</text>
    <text x="320" y="178" font-size="26" font-weight="800" fill="#f8fafc" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif">算力 × 模型 × Agent</text>

    <g style="outline:none" cursor="pointer">
      <circle cx="320" cy="160" r="52" fill="transparent" stroke="#38bdf8" stroke-width="2" opacity="0.7">
        <animate attributeName="r" values="52;220" begin="click" dur="0.8s" fill="freeze" restart="never"/>
        <animate attributeName="opacity" values="0.7;0" begin="click" dur="0.8s" fill="freeze" restart="never"/>
      </circle>
      <text x="320" y="250" font-size="11" fill="#475569" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif">点击中心 · 触发能量脉冲</text>
    </g>
  </svg>

  <section style="padding:14px 18px 22px;">
    <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.65;">自动轨道动画营造科技氛围；点击脉冲为单次 freeze 动效。</p>
  </section>
</section>
