<section style="max-width:680px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#0b1220;color:#e2e8f0;">

    <p style="margin:6px 0 0;font-size:11px;color:#64748b;">仅彩色 Tab 可点 · 逐层 peel</p>

    <rect x="172" y="16" width="148" height="36" fill="#1e293b" rx="18" style="pointer-events:none;"/>

    <text x="246" y="39" font-size="12" fill="#94a3b8" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" style="pointer-events:none;">Agent</text>

      <rect x="0" y="0" width="640" height="420" fill="#0f172a" style="pointer-events:none;"/>

      <animate attributeName="opacity" values="1;0" begin="click" dur="0.35s" fill="freeze" restart="never"/>
      <animate attributeName="visibility" values="visible;hidden" begin="click" dur="0.01s" fill="freeze" restart="never"/>

    <!-- 顶层：大模型 → 点「Agent」peel -->
    <g style="outline:none" opacity="1">
      <rect x="0" y="0" width="640" height="420" fill="#0f172a" style="pointer-events:none;"/>
      <rect x="16" y="16" width="148" height="36" fill="#1e40af" rx="18" style="pointer-events:none;"/>
      <text x="90" y="39" font-size="12" fill="#93c5fd" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif" style="pointer-events:none;">大模型</text>

  <section style="padding:16px 20px 24px;font-size:12px;color:#64748b;line-height:1.6;">
