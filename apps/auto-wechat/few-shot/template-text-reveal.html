<!-- 微信公众号模板：祝福卡式点击显文 -->
<!--
  TEMPLATE_META:
  name: 祝福卡点击显文
  description: 封面遮罩 peel 淡出露出底层祝福正文（hero 遮罩范式）
  tags: [应用, 产品发布]
  hasSvg: true
  INTERACTION: 文字点击隐藏显示 / 祝福卡
-->
<section style="max-width:680px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#1a0a2e;">

  <section style="padding:22px 18px 8px;">
    <p style="margin:0 0 4px;font-size:10px;letter-spacing:2px;color:#f0abfc;">TEXT REVEAL</p>
    <p style="margin:0;font-size:19px;font-weight:800;color:#faf5ff;">点击拆开 · AI 祝福卡</p>
  </section>

  <svg style="display:block;width:100%;overflow:hidden;border-radius:16px;" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="20" width="600" height="320" fill="#2e1065" rx="16"/>
    <rect x="20" y="20" width="600" height="160" fill="#7c3aed" opacity="0.35" rx="16"/>
    <rect x="20" y="180" width="600" height="160" fill="#db2777" opacity="0.25" rx="16"/>

    <!-- 祝福正文（底层预绘） -->
    <text x="60" y="100" font-size="22" font-weight="800" fill="#fdf4ff" font-family="-apple-system,PingFang SC,sans-serif">致 AI 开发者</text>
    <text x="60" y="140" font-size="14" fill="#f5d0fe" font-family="-apple-system,PingFang SC,sans-serif">愿你的 Prompt 永远精准，</text>
    <text x="60" y="168" font-size="14" fill="#f5d0fe" font-family="-apple-system,PingFang SC,sans-serif">Token 永不溢出，推理永远在线。</text>
    <text x="60" y="210" font-size="12" fill="#e9d5ff" font-family="-apple-system,PingFang SC,sans-serif">—— 来自 AI 科技日报编辑部</text>
    <rect x="60" y="230" width="520" height="1" fill="#c084fc" opacity="0.4"/>
    <text x="60" y="260" font-size="11" fill="#a78bfa" font-family="-apple-system,PingFang SC,sans-serif">2026 · 持续构建，持续交付</text>

    <!-- 封面遮罩 peel -->
    <g style="outline:none" cursor="pointer">
      <rect x="20" y="20" width="600" height="320" fill="#2e1065" rx="16"/>
      <text x="320" y="150" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif">🎁</text>
      <text x="320" y="190" font-size="16" fill="#fae8ff" text-anchor="middle" font-family="-apple-system,PingFang SC,sans-serif">点击拆开祝福卡</text>
      <circle cx="320" cy="240" r="6" fill="#f0abfc">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <animate attributeName="opacity" values="1;0" begin="click" dur="0.45s" fill="freeze" restart="never"/>
    </g>
  </svg>
</section>
