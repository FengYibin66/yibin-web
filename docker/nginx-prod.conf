user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # ──────────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect (all domains)
    # ──────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────────────────────────
    # HTTPS: Portal (www.yibinfeng.com)
    # ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name www.yibinfeng.com;

        ssl_certificate /etc/letsencrypt/live/www.yibinfeng.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.yibinfeng.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html/portal;
        index index.html;

        # Portal Frontend (Vite dist/)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Portal Backend API
        location /api/ {
            proxy_pass http://portal-server:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static assets cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ──────────────────────────────────────────────────────────────
    # HTTPS: Resume (resume.yibinfeng.com)
    # ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name resume.yibinfeng.com;

        ssl_certificate /etc/letsencrypt/live/resume.yibinfeng.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/resume.yibinfeng.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html/resume;
        index index.html;

        # Resume Frontend (Next.js SSG out/)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static assets cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Disable caching for HTML files
        location ~* \.html?$ {
            add_header Cache-Control "public, max-age=3600";
        }
    }

    # ──────────────────────────────────────────────────────────────
    # HTTPS: Auto-Wechat (mpauto.yibinfeng.com)
    # ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name mpauto.yibinfeng.com;

        ssl_certificate /etc/letsencrypt/live/mpauto.yibinfeng.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mpauto.yibinfeng.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html/wechat;
        index index.html;

        # Auto-Wechat Frontend (Vue dist/)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Auto-Wechat Backend API
        location /api/ {
            proxy_pass http://auto-wechat-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts for long-polling or streaming
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Static assets cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ──────────────────────────────────────────────────────────────
    # HTTP/2 Push (optional, for performance)
    # ──────────────────────────────────────────────────────────────
    # Uncomment if needed for critical assets

    # include /etc/nginx/conf.d/*.conf;
}
